services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: auto_workflow_pg
    environment:
      POSTGRES_USER: auto_workflow
      POSTGRES_PASSWORD: auto_workflow
      POSTGRES_DB: auto_workflow
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schemas:/schemas:ro
      - ./migrations:/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auto_workflow -d auto_workflow"]
      interval: 2s
      timeout: 3s
      retries: 20

volumes:
  pgdata:
